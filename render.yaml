services:
  - type: web
    name: spxopslab
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    domains:
      - spxopslab.store
      - www.spxopslab.store
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: APP_BASIC_AUTH_USER
        sync: false
      - key: APP_BASIC_AUTH_PASSWORD
        sync: false
      - key: TRADINGVIEW_WEBHOOK_SECRET
        sync: false
      - key: UW_PROVIDER_MODE
        value: api
      - key: UW_API_KEY
        sync: false
      - key: UW_API_BASE_URL
        value: https://api.unusualwhales.com
      - key: UW_STALE_SECONDS
        value: 300
      - key: UW_POLL_INTERVAL_SECONDS
        value: 60
